<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>iOS 5 Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    #weather-backdrop, body:before, body:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
    }

    #weather-backdrop {
      top: 0;
      bottom: 0;
      z-index: 0;
      background: #000000;
      background-position: center center;
      background-repeat: no-repeat;
      -webkit-background-size: cover;
      background-size: cover;
      opacity: 0;
      -webkit-transition: opacity 900ms ease;
      transition: opacity 900ms ease;
    }

    #weather-backdrop.visible {
      opacity: 0.46;
    }

    #weather-backdrop:after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.42);
      background: -webkit-gradient(linear, left top, left bottom, from(rgba(0,0,0,0.30)), color-stop(0.50, rgba(0,0,0,0.54)), to(rgba(0,0,0,0.72)));
      background: linear-gradient(to bottom, rgba(0,0,0,0.30), rgba(0,0,0,0.54) 50%, rgba(0,0,0,0.72));
    }

    body:before, body:after {
      z-index: 1;
    }

    body:before {
      top: 0;
      height: 30%;
      background: -webkit-gradient(linear, left top, left bottom,
        from(rgba(255,255,255,0.055)), color-stop(0.22, rgba(255,255,255,0.018)),
        to(rgba(255,255,255,0)));
      background: linear-gradient(to bottom, rgba(255,255,255,0.055), rgba(255,255,255,0.018) 22%, rgba(255,255,255,0));
    }

    body:after {
      top: 7%;
      left: -8%;
      width: 116%;
      height: 15%;
      -webkit-transform: rotate(-7deg);
      transform: rotate(-7deg);
      background: rgba(255,255,255,0.012);
      -webkit-border-radius: 50%;
      border-radius: 50%;
      -webkit-filter: blur(1px);
      filter: blur(1px);
    }

    #stage {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      margin-top: -218px;
      text-align: center;
      z-index: 2;
    }

    #clock {
      display: inline-block;
      width: 100%;
    }

    #time-row {
      white-space: nowrap;
      text-align: center;
    }

    #time {
      display: inline-block;
      font-size: 292px;
      line-height: 258px;
      font-weight: 100;
      letter-spacing: -22px;
      color: #ffffff;
      text-shadow: 0 0 3px rgba(255,255,255,0.36),
        0 0 15px rgba(255,255,255,0.14);
    }

    #seconds {
      display: inline-block;
      width: 84px;
      margin-left: 16px;
      color: rgba(255,255,255,0.9);
      font-size: 66px;
      line-height: 66px;
      font-weight: 100;
      letter-spacing: -2px;
      text-align: left;
      vertical-align: -51px;
      text-shadow: 0 0 3px rgba(255,255,255,0.26);
    }

    #date {
      margin-top: 34px;
      color: rgba(210,210,214,0.72);
      font-size: 28px;
      line-height: 34px;
      font-weight: 100;
      letter-spacing: 1.8px;
      text-align: center;
      text-shadow: 0 0 8px rgba(255,255,255,0.08);
    }

    #weather {
      margin-top: 10px;
      color: rgba(210,210,214,0.58);
      font-size: 18px;
      line-height: 24px;
      font-weight: 100;
      letter-spacing: 1.2px;
      text-align: center;
      text-shadow: none;
    }

    .corner-icon {
      position: absolute;
      bottom: 23px;
      z-index: 4;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      opacity: 0.42;
      color: #ffffff;
      text-align: center;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 22px;
      line-height: 32px;
      text-shadow: 0 0 10px rgba(255,255,255,0.34);
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: rgba(255,255,255,0.12);
    }

    .corner-icon:active, .corner-icon.active {
      opacity: 0.88;
    }

    #settings-panel {
      position: absolute;
      left: 18px;
      bottom: 66px;
      z-index: 4;
      width: 236px;
      padding: 12px 13px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(18,18,20,0.86);
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      line-height: 18px;
      text-align: left;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      -webkit-border-radius: 11px;
      border-radius: 11px;
      -webkit-box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    #settings-panel.hidden {
      display: none;
    }

    #settings-panel label {
      display: block;
      margin: 6px 0;
      white-space: nowrap;
    }

    #settings-panel input {
      margin: 0 8px 0 0;
      vertical-align: -2px;
    }

    #settings-panel .manual-location {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    #manual-location-query {
      width: 142px;
      height: 24px;
      margin: 0;
      padding: 0 7px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(0,0,0,0.36);
      color: #ffffff;
      font-size: 13px;
      -webkit-border-radius: 7px;
      border-radius: 7px;
      -webkit-appearance: none;
    }

    #manual-location-submit {
      height: 26px;
      margin-left: 5px;
      padding: 0 8px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.09);
      color: #ffffff;
      font-size: 13px;
      -webkit-border-radius: 7px;
      border-radius: 7px;
      -webkit-appearance: none;
    }

    #manual-location-help {
      margin-top: 6px;
      color: rgba(255,255,255,0.52);
      font-size: 11px;
      line-height: 14px;
    }

    #settings {
      left: 24px;
    }

    #fullscreen {
      right: 24px;
    }

    #fullscreen:before, #fullscreen:after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: #ffffff;
      opacity: 0.95;
    }

    #fullscreen:before {
      top: 1px;
      right: 1px;
      border-top: 2px solid;
      border-right: 2px solid;
    }

    #fullscreen:after {
      left: 1px;
      bottom: 1px;
      border-left: 2px solid;
      border-bottom: 2px solid;
    }

    @media only screen and (orientation: portrait) {
      #stage { margin-top: -166px; }
      #time { font-size: 202px; line-height: 188px; letter-spacing: -14px; }
      #seconds { width: 62px; margin-left: 12px; font-size: 49px; line-height: 49px; vertical-align: -36px; }
      #date { margin-top: 30px; font-size: 23px; line-height: 30px; }
      #weather { margin-top: 8px; font-size: 16px; line-height: 22px; }
    }
  </style>
</head>
<body>
  <div id="weather-backdrop"></div>
  <div id="stage">
    <div id="clock">
      <div id="time-row"><span id="time">08:42</span><span id="seconds">15</span></div>
      <div id="date">lundi 9 janvier</div>
      <div id="weather">météo en attente de localisation</div>
    </div>
  </div>
  <div id="settings-panel" class="hidden" aria-hidden="true">
    <label><input id="toggle-seconds" type="checkbox" checked>Afficher les secondes</label>
    <label><input id="toggle-24h" type="checkbox" checked>Format 24 heures</label>
    <form id="manual-location-form" class="manual-location" action="#">
      <input id="manual-location-query" type="text" autocapitalize="off" autocomplete="postal-code" placeholder="adresse ou code postal" aria-label="Adresse ou code postal">
      <button id="manual-location-submit" type="submit">OK</button>
      <div id="manual-location-help">Fallback iPad 1 si la localisation échoue.</div>
    </form>
  </div>
  <button id="settings" class="corner-icon" type="button" aria-label="Réglages" aria-controls="settings-panel" aria-expanded="false">&#9881;</button>
  <button id="fullscreen" class="corner-icon" type="button" aria-label="Plein écran"></button>
  <script type="text/javascript">
    (function () {
      var timeEl = document.getElementById('time');
      var secondsEl = document.getElementById('seconds');
      var dateEl = document.getElementById('date');
      var weatherEl = document.getElementById('weather');
      var weatherBackdrop = document.getElementById('weather-backdrop');
      var settingsButton = document.getElementById('settings');
      var fullscreenButton = document.getElementById('fullscreen');
      var settingsPanel = document.getElementById('settings-panel');
      var secondsToggle = document.getElementById('toggle-seconds');
      var formatToggle = document.getElementById('toggle-24h');
      var manualLocationForm = document.getElementById('manual-location-form');
      var manualLocationQuery = document.getElementById('manual-location-query');
      var days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
      var months = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
      var showSeconds = secondsToggle.checked;
      var use24Hour = formatToggle.checked;
      var manualWeatherLocation = null;
      var weatherCodeLabels = {
        0: 'ciel clair', 1: 'plutôt clair', 2: 'partiellement nuageux', 3: 'nuageux',
        45: 'brouillard', 48: 'brouillard givrant', 51: 'bruine légère', 53: 'bruine', 55: 'bruine forte',
        56: 'bruine verglaçante', 57: 'forte bruine verglaçante', 61: 'pluie légère', 63: 'pluie', 65: 'forte pluie',
        66: 'pluie verglaçante', 67: 'forte pluie verglaçante', 71: 'neige légère', 73: 'neige', 75: 'forte neige',
        77: 'grains de neige', 80: 'averses légères', 81: 'averses', 82: 'fortes averses',
        85: 'averses de neige', 86: 'fortes averses de neige', 95: 'orage', 96: 'orage avec grêle', 99: 'fort orage avec grêle'
      };
      var weatherCodeBackgrounds = {
        0: 'code-0', 1: 'code-1', 2: 'code-2', 3: 'code-3',
        45: 'code-45', 48: 'code-48', 51: 'code-51', 53: 'code-53', 55: 'code-55', 56: 'code-56', 57: 'code-57',
        61: 'code-61', 63: 'code-63', 65: 'code-65', 66: 'code-66', 67: 'code-67',
        71: 'code-71', 73: 'code-73', 75: 'code-75', 77: 'code-77',
        80: 'code-80', 81: 'code-81', 82: 'code-82', 85: 'code-85', 86: 'code-86',
        95: 'code-95', 96: 'code-96', 99: 'code-99'
      };

      function pad(value) {
        return value < 10 ? '0' + value : '' + value;
      }

      function hasClass(element, className) {
        return (' ' + element.className + ' ').indexOf(' ' + className + ' ') > -1;
      }

      function setClass(element, className, enabled) {
        var current = ' ' + element.className + ' ';
        if (enabled && current.indexOf(' ' + className + ' ') === -1) {
          element.className = (element.className ? element.className + ' ' : '') + className;
        } else if (!enabled) {
          element.className = current.replace(' ' + className + ' ', ' ').replace(/^\s+|\s+$/g, '');
        }
      }

      function saveManualWeatherLocation(location) {
        manualWeatherLocation = location;
        try {
          window.localStorage.setItem('ios5-clock-weather-location', JSON.stringify(location));
        } catch (e) {}
      }

      function getSavedManualWeatherLocation() {
        try {
          return JSON.parse(window.localStorage.getItem('ios5-clock-weather-location'));
        } catch (e) {
          return null;
        }
      }

      function updateClock() {
        var now = new Date();
        var hours = now.getHours();

        if (!use24Hour) {
          hours = hours % 12;
          hours = hours ? hours : 12;
        }

        var hoursStr = use24Hour ? pad(hours) : '' + hours;
        var ampm = use24Hour ? '' : (now.getHours() < 12 ? ' AM' : ' PM');
        timeEl.innerHTML = hoursStr + ':' + pad(now.getMinutes()) + ampm;
        secondsEl.innerHTML = pad(now.getSeconds());
        secondsEl.style.visibility = showSeconds ? 'visible' : 'hidden';
        dateEl.innerHTML = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
      }

      function setWeatherBackground(weatherCode) {
        var name = weatherCodeBackgrounds[weatherCode];
        if (!name) {
          setClass(weatherBackdrop, 'visible', false);
          weatherBackdrop.style.backgroundImage = '';
          return;
        }

        weatherBackdrop.style.backgroundImage = 'url(assets/weather/' + name + '.svg)';
        setClass(weatherBackdrop, 'visible', true);
      }

      function updateWeatherText(data, locationLabel) {
        if (!data || !data.current_weather) {
          weatherEl.textContent = 'météo indisponible';
          return;
        }

        var current = data.current_weather;
        var label = weatherCodeLabels[current.weathercode] || 'conditions météo';
        setWeatherBackground(current.weathercode);
        var text = Math.round(current.temperature) + '°C · ' + label;
        if (locationLabel) {
          text += ' · ' + locationLabel;
        }
        weatherEl.textContent = text;
      }

      function loadWeather(latitude, longitude, locationLabel) {
        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + encodeURIComponent(latitude) + '&longitude=' + encodeURIComponent(longitude) + '&current_weather=true&temperature_unit=celsius&timezone=auto';
        var request = new XMLHttpRequest();
        request.open('GET', url, true);
        request.timeout = 15000;
        request.onreadystatechange = function () {
          if (request.readyState !== 4) {
            return;
          }

          if (request.status >= 200 && request.status < 300) {
            try {
              updateWeatherText(JSON.parse(request.responseText), locationLabel);
            } catch (e) {
              weatherEl.textContent = 'météo indisponible (erreur parse: ' + e.message + ')';
            }
          } else {
            weatherEl.textContent = 'météo indisponible (HTTP ' + request.status + ')';
          }
        };
        request.onerror = function () {
          weatherEl.textContent = 'météo indisponible (erreur réseau)';
        };
        request.ontimeout = function () {
          weatherEl.textContent = 'météo indisponible (délai dépassé)';
        };
        request.send(null);
      }

      function geocodeManualLocation(query) {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=fr&q=' + encodeURIComponent(query);
        var request = new XMLHttpRequest();
        request.open('GET', url, true);
        request.timeout = 15000;
        weatherEl.textContent = 'géocodage en cours…';
        request.onreadystatechange = function () {
          var result;
          if (request.readyState !== 4) {
            return;
          }

          if (request.status >= 200 && request.status < 300) {
            try {
              result = JSON.parse(request.responseText);
              if (result && result.length) {
                saveManualWeatherLocation({
                  latitude: result[0].lat,
                  longitude: result[0].lon,
                  label: result[0].display_name
                });
                var shortLabel = (result[0].display_name || '').split(',')[0];
                weatherEl.textContent = 'météo en chargement · ' + shortLabel;
                loadWeather(result[0].lat, result[0].lon, shortLabel);
                return;
              }
              weatherEl.textContent = 'adresse introuvable (aucun résultat pour "' + query + '")';
            } catch (e) {
              weatherEl.textContent = 'adresse introuvable (erreur parse: ' + e.message + ')';
            }
          } else if (request.status === 0) {
            weatherEl.textContent = 'adresse introuvable (erreur réseau, vérifier connexion/SSL)';
          } else {
            weatherEl.textContent = 'adresse introuvable (HTTP ' + request.status + ')';
          }
        };
        request.onerror = function () {
          weatherEl.textContent = 'adresse introuvable (erreur réseau)';
        };
        request.ontimeout = function () {
          weatherEl.textContent = 'adresse introuvable (délai dépassé, 15 s)';
        };
        request.send(null);
      }

      function initWeather() {
        var savedLocation = manualWeatherLocation || getSavedManualWeatherLocation();
        if (savedLocation && savedLocation.latitude && savedLocation.longitude) {
          manualWeatherLocation = savedLocation;
          var shortLabel = savedLocation.label ? savedLocation.label.split(',')[0] : '';
          weatherEl.textContent = 'météo en chargement' + (shortLabel ? ' · ' + shortLabel : '');
          loadWeather(savedLocation.latitude, savedLocation.longitude, shortLabel || null);
          return;
        }

        if (!navigator.geolocation) {
          weatherEl.textContent = 'météo : saisir une adresse';
          return;
        }

        navigator.geolocation.getCurrentPosition(function (position) {
          weatherEl.textContent = 'météo en chargement · GPS';
          loadWeather(position.coords.latitude, position.coords.longitude, 'GPS');
        }, function (err) {
          weatherEl.textContent = 'météo : saisir une adresse' + (err && err.code ? ' (geo err ' + err.code + ')' : '');
        }, { maximumAge: 1800000, timeout: 12000 });
      }

      function toggleSettings() {
        var isHidden = hasClass(settingsPanel, 'hidden');
        setClass(settingsPanel, 'hidden', !isHidden);
        settingsPanel.setAttribute('aria-hidden', !isHidden ? 'true' : 'false');
        settingsButton.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
        setClass(settingsButton, 'active', isHidden);
      }

      function requestFullscreen(element) {
        var request = element.requestFullscreen || element.webkitRequestFullScreen || element.webkitRequestFullscreen || element.mozRequestFullScreen || element.msRequestFullscreen;
        if (request) {
          request.call(element);
        }
      }

      function exitFullscreen() {
        var exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
        if (exit) {
          exit.call(document);
        }
      }

      function isFullscreen() {
        return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
      }

      function toggleFullscreen() {
        if (isFullscreen()) {
          exitFullscreen();
        } else {
          requestFullscreen(document.documentElement);
        }
      }

      settingsButton.onclick = toggleSettings;
      fullscreenButton.onclick = toggleFullscreen;
      if (!document.documentElement.requestFullscreen && !document.documentElement.webkitRequestFullScreen && !document.documentElement.webkitRequestFullscreen && !document.documentElement.mozRequestFullScreen && !document.documentElement.msRequestFullscreen) {
        fullscreenButton.style.display = 'none';
      }
      secondsToggle.onclick = function () {
        showSeconds = secondsToggle.checked;
        updateClock();
      };
      formatToggle.onclick = function () {
        use24Hour = formatToggle.checked;
        updateClock();
      };
      manualLocationForm.onsubmit = function (e) {
        if (e && e.preventDefault) { e.preventDefault(); }
        var query = manualLocationQuery.value.replace(/^\s+|\s+$/g, '');
        if (query) {
          geocodeManualLocation(query);
        }
        return false;
      };

      updateClock();
      initWeather();
      setInterval(updateClock, 1000);
      setInterval(initWeather, 1800000);
    }());
  </script>
</body>
</html>
