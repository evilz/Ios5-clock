<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>iOS 5 Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    #weather-backdrop, body:before, body:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
    }

    #weather-backdrop {
      top: 0;
      bottom: 0;
      z-index: 0;
      background: #000000;
      background-position: center center;
      background-repeat: no-repeat;
      -webkit-background-size: cover;
      background-size: cover;
      opacity: 0;
      -webkit-transition: opacity 900ms ease;
      transition: opacity 900ms ease;
    }

    #weather-backdrop.visible {
      opacity: 0.8;
    }

    #weather-backdrop:after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.42);
      background: -webkit-gradient(linear, left top, left bottom, from(rgba(0,0,0,0.30)), color-stop(0.50, rgba(0,0,0,0.54)), to(rgba(0,0,0,0.72)));
      background: linear-gradient(to bottom, rgba(0,0,0,0.30), rgba(0,0,0,0.54) 50%, rgba(0,0,0,0.72));
    }

    body:before, body:after {
      z-index: 1;
    }

    body:before {
      top: 0;
      height: 30%;
      background: -webkit-gradient(linear, left top, left bottom,
        from(rgba(255,255,255,0.055)), color-stop(0.22, rgba(255,255,255,0.018)),
        to(rgba(255,255,255,0)));
      background: linear-gradient(to bottom, rgba(255,255,255,0.055), rgba(255,255,255,0.018) 22%, rgba(255,255,255,0));
    }

    body:after {
      top: 7%;
      left: -8%;
      width: 116%;
      height: 15%;
      -webkit-transform: rotate(-7deg);
      transform: rotate(-7deg);
      background: rgba(255,255,255,0.012);
      -webkit-border-radius: 50%;
      border-radius: 50%;
      -webkit-filter: blur(1px);
      filter: blur(1px);
    }

    #stage {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      margin-top: -218px;
      text-align: center;
      z-index: 2;
    }

    #clock {
      display: inline-block;
      width: 100%;
    }

    #time-row {
      white-space: nowrap;
      text-align: center;
    }

    #time {
      display: inline-block;
      font-size: 292px;
      line-height: 258px;
      font-weight: 100;
      letter-spacing: -22px;
      color: #ffffff;
      text-shadow: 0 0 3px rgba(255,255,255,0.36),
        0 0 15px rgba(255,255,255,0.14);
    }

    #seconds {
      display: inline-block;
      width: 84px;
      margin-left: 16px;
      color: rgba(255,255,255,0.9);
      font-size: 66px;
      line-height: 66px;
      font-weight: 100;
      letter-spacing: -2px;
      text-align: left;
      vertical-align: -51px;
      text-shadow: 0 0 3px rgba(255,255,255,0.26);
    }

    #date {
      margin-top: 34px;
      color: rgba(210,210,214,0.72);
      font-size: 28px;
      line-height: 34px;
      font-weight: 100;
      letter-spacing: 1.8px;
      text-align: center;
      text-shadow: 0 0 8px rgba(255,255,255,0.08);
    }

    #weather {
      margin-top: 10px;
      color: rgba(210,210,214,0.58);
      font-size: 18px;
      line-height: 24px;
      font-weight: 100;
      letter-spacing: 1.2px;
      text-align: center;
      text-shadow: none;
    }

    #weather-debug {
      display: none;
      max-width: 88%;
      margin: 6px auto 0;
      color: rgba(210,210,214,0.34);
      font-size: 11px;
      line-height: 14px;
      font-weight: 100;
      letter-spacing: 0.4px;
      text-align: center;
      text-shadow: none;
      word-wrap: break-word;
    }

    .corner-icon {
      position: absolute;
      bottom: 23px;
      z-index: 4;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      opacity: 0.42;
      color: #ffffff;
      text-align: center;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 22px;
      line-height: 32px;
      text-shadow: 0 0 10px rgba(255,255,255,0.34);
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: rgba(255,255,255,0.12);
    }

    .corner-icon:active, .corner-icon.active {
      opacity: 0.88;
    }

    #settings-panel {
      position: absolute;
      left: 18px;
      bottom: 66px;
      z-index: 4;
      width: 236px;
      padding: 12px 13px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(18,18,20,0.86);
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      line-height: 18px;
      text-align: left;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      -webkit-border-radius: 11px;
      border-radius: 11px;
      -webkit-box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    #settings-panel.hidden {
      display: none;
    }

    #settings-panel label {
      display: block;
      margin: 6px 0;
      white-space: nowrap;
    }

    #settings-panel input {
      margin: 0 8px 0 0;
      vertical-align: -2px;
    }

    #settings-panel .manual-location {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    #manual-location-query {
      width: 142px;
      height: 24px;
      margin: 0;
      padding: 0 7px;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(0,0,0,0.36);
      color: #ffffff;
      font-size: 13px;
      -webkit-border-radius: 7px;
      border-radius: 7px;
      -webkit-appearance: none;
    }

    #manual-location-submit {
      height: 26px;
      margin-left: 5px;
      padding: 0 8px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.09);
      color: #ffffff;
      font-size: 13px;
      -webkit-border-radius: 7px;
      border-radius: 7px;
      -webkit-appearance: none;
    }

    #manual-location-help {
      margin-top: 6px;
      color: rgba(255,255,255,0.52);
      font-size: 11px;
      line-height: 14px;
    }

    #settings {
      left: 24px;
    }

    #fullscreen {
      right: 24px;
    }

    #fullscreen:before, #fullscreen:after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: #ffffff;
      opacity: 0.95;
    }

    #fullscreen:before {
      top: 1px;
      right: 1px;
      border-top: 2px solid;
      border-right: 2px solid;
    }

    #fullscreen:after {
      left: 1px;
      bottom: 1px;
      border-left: 2px solid;
      border-bottom: 2px solid;
    }

    @media only screen and (orientation: portrait) {
      #stage { margin-top: -166px; }
      #time { font-size: 202px; line-height: 188px; letter-spacing: -14px; }
      #seconds { width: 62px; margin-left: 12px; font-size: 49px; line-height: 49px; vertical-align: -36px; }
      #date { margin-top: 30px; font-size: 23px; line-height: 30px; }
      #weather { margin-top: 8px; font-size: 16px; line-height: 22px; }
      #weather-debug { font-size: 10px; line-height: 13px; }
    }
  </style>
</head>
<body>
  <div id="weather-backdrop"></div>
  <div id="stage">
    <div id="clock">
      <div id="time-row"><span id="time">08:42</span><span id="seconds">15</span></div>
      <div id="date">lundi 9 janvier</div>
      <div id="weather">météo en attente de localisation</div>
      <div id="weather-debug" aria-hidden="true"></div>
    </div>
  </div>
  <div id="settings-panel" class="hidden" aria-hidden="true">
    <label><input id="toggle-seconds" type="checkbox" checked>Afficher les secondes</label>
    <label><input id="toggle-24h" type="checkbox" checked>Format 24 heures</label>
    <form id="manual-location-form" class="manual-location" action="#">
      <input id="manual-location-query" type="text" autocapitalize="off" autocomplete="postal-code" placeholder="adresse ou code postal" aria-label="Adresse ou code postal">
      <button id="manual-location-submit" type="submit">OK</button>
      <div id="manual-location-help">iPad 1 : code postal français traité hors-ligne, ou latitude,longitude.</div>
    </form>
  </div>
  <button id="settings" class="corner-icon" type="button" aria-label="Réglages" aria-controls="settings-panel" aria-expanded="false">&#9881;</button>
  <button id="fullscreen" class="corner-icon" type="button" aria-label="Plein écran"></button>

        0: 'code-0', 1: 'code-1', 2: 'code-2', 3: 'code-3',
        45: 'code-45', 48: 'code-48', 51: 'code-51', 53: 'code-53', 55: 'code-55', 56: 'code-56', 57: 'code-57',

      function pad(value) {
        return value < 10 ? '0' + value : '' + value;
      }

      function hasClass(element, className) {
        return (' ' + element.className + ' ').indexOf(' ' + className + ' ') > -1;
      }

      function setClass(element, className, enabled) {
        var current = ' ' + element.className + ' ';
        if (enabled && current.indexOf(' ' + className + ' ') === -1) {
          element.className = (element.className ? element.className + ' ' : '') + className;
        } else if (!enabled) {
          element.className = current.replace(' ' + className + ' ', ' ').replace(/^\s+|\s+$/g, '');
        }
      }

      function saveManualWeatherLocation(location) {
        manualWeatherLocation = location;
        try {
          window.localStorage.setItem('ios5-clock-weather-location', JSON.stringify(location));
        } catch (e) {}
      }

      function getSavedManualWeatherLocation() {
        try {
          return JSON.parse(window.localStorage.getItem('ios5-clock-weather-location'));
        } catch (e) {
          return null;
        }
      }

      function updateClock() {
        var now = new Date();
        var hours = now.getHours();

        if (!use24Hour) {
          hours = hours % 12;
          hours = hours ? hours : 12;
        }

        var hoursStr = use24Hour ? pad(hours) : '' + hours;
        var ampm = use24Hour ? '' : (now.getHours() < 12 ? ' AM' : ' PM');
        timeEl.innerHTML = hoursStr + ':' + pad(now.getMinutes()) + ampm;
        secondsEl.innerHTML = pad(now.getSeconds());
        secondsEl.style.visibility = showSeconds ? 'visible' : 'hidden';
        dateEl.innerHTML = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
      }

      function setWeatherBackground(weatherCode) {
        var name = weatherCodeBackgrounds[weatherCode];
        if (!name) {
          setClass(weatherBackdrop, 'visible', false);
          weatherBackdrop.style.backgroundImage = '';
          return;
        }

        weatherBackdrop.style.backgroundImage = 'url(assets/weather/' + name + '.svg)';
        setClass(weatherBackdrop, 'visible', true);
      }

      function setWeatherDebug(message) {
        if (!weatherDebugEl) { return; }
        weatherDebugEl.textContent = message || '';
        weatherDebugEl.style.display = message ? 'block' : 'none';
      }

      function getXhrSupportLabel(request) {
        var parts = [];
        parts.push('XHR=' + (!!window.XMLHttpRequest ? 'oui' : 'non'));
        parts.push('CORS=' + (request && 'withCredentials' in request ? 'oui' : 'incertain'));
        parts.push('timeout=' + (request && 'timeout' in request ? 'oui' : 'non'));
        parts.push('protocole=' + window.location.protocol);
        return parts.join(' · ');
      }

      function shorten(value, maxLength) {
        value = value || '';
        if (value.length > maxLength) {
          return value.substr(0, maxLength) + '…';
        }
        return value;
      }

      function describeXhr(request, phase, startedAt, url) {
        var elapsed = startedAt ? (new Date().getTime() - startedAt) + ' ms' : '? ms';
        var statusText = '';
        try { statusText = request.statusText || ''; } catch (e) {}
        var status = '?';
        try { status = request.status; } catch (e) {}
        return phase + ' · readyState=' + request.readyState + ' · status=' + status +
          (statusText ? ' ' + statusText : '') + ' · durée=' + elapsed + ' · ' +
          getXhrSupportLabel(request) + ' · URL=' + shorten(url, 140);
      }

      function updateWeatherText(data, locationLabel) {
        if (!data || !data.current_weather) {
          weatherEl.textContent = 'météo indisponible';
          setWeatherDebug('réponse reçue mais champ current_weather absent');
          return;
        }

        var current = data.current_weather;
        var label = weatherCodeLabels[current.weathercode] || 'conditions météo';
        setWeatherBackground(current.weathercode);
        var text = Math.round(current.temperature) + '°C · ' + label;
        if (locationLabel) {
          text += ' · ' + locationLabel;
        }
        weatherEl.textContent = text;
      }

      function runXhr(url, label, successCallback, errorPrefix) {
        var request;
        var startedAt = new Date().getTime();
        var finished = false;
        var timer;

        if (!window.XMLHttpRequest) {
          weatherEl.textContent = errorPrefix + ' (XHR absent)';
          setWeatherDebug('XMLHttpRequest indisponible dans ce navigateur · UA=' + shorten(navigator.userAgent, 180));
          return;
        }

        request = new XMLHttpRequest();
        setWeatherDebug(label + ' · ouverture · ' + getXhrSupportLabel(request) + ' · UA=' + shorten(navigator.userAgent, 160));

        request.onreadystatechange = function () {
          setWeatherDebug(describeXhr(request, label, startedAt, url));
          if (request.readyState !== 4 || finished) {
            return;
          }

          finished = true;
          if (timer) { window.clearTimeout(timer); }

          if (request.status >= 200 && request.status < 300) {
            try {
              //setWeatherDebug(describeXhr(request, label + ' OK', startedAt, url) + ' · réponse=' + (request.responseText ? request.responseText.length : 0) + ' caractères');
              successCallback(JSON.parse(request.responseText));
            } catch (e) {
              weatherEl.textContent = errorPrefix + ' (erreur parse: ' + e.message + ')';
              setWeatherDebug(describeXhr(request, label + ' parse', startedAt, url) + ' · début réponse=' + shorten(request.responseText, 160));
            }
          } else if (request.status === 0) {
            weatherEl.textContent = errorPrefix + ' (status 0 : réseau/CORS/SSL)';
            setWeatherDebug(describeXhr(request, label + ' status 0', startedAt, url) + ' · souvent SSL ancien iOS, CORS ou fichier local');
          } else {
            weatherEl.textContent = errorPrefix + ' (HTTP ' + request.status + ')';
            setWeatherDebug(describeXhr(request, label + ' HTTP', startedAt, url) + ' · début réponse=' + shorten(request.responseText, 160));
          }
        };
        request.onerror = function () {
          if (finished) { return; }
          finished = true;
          if (timer) { window.clearTimeout(timer); }
          weatherEl.textContent = errorPrefix + ' (erreur réseau)';
          setWeatherDebug(describeXhr(request, label + ' onerror', startedAt, url) + ' · vérifier SSL/CORS/DNS');
        };

        try {
          request.open('GET', url, true);
          if ('timeout' in request) {
            request.timeout = 15000;
            request.ontimeout = function () {
              if (finished) { return; }
              finished = true;
              weatherEl.textContent = errorPrefix + ' (délai dépassé XHR)';
              setWeatherDebug(describeXhr(request, label + ' timeout XHR', startedAt, url));
            };
          }
          timer = window.setTimeout(function () {
            if (finished) { return; }
            finished = true;
            try { request.abort(); } catch (e) {}
            weatherEl.textContent = errorPrefix + ' (délai dépassé, 15 s)';
            setWeatherDebug(describeXhr(request, label + ' timeout JS', startedAt, url) + ' · timeout manuel compatible iOS 5');
          }, 15000);
          request.send(null);
        } catch (e) {
          finished = true;
          if (timer) { window.clearTimeout(timer); }
          weatherEl.textContent = errorPrefix + ' (exception XHR)';
          setWeatherDebug(label + ' exception · ' + e.name + ': ' + e.message + ' · URL=' + shorten(url, 140));
        }
      }

      function loadWeather(latitude, longitude, locationLabel) {
        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + encodeURIComponent(latitude) + '&longitude=' + encodeURIComponent(longitude) + '&current_weather=true&temperature_unit=celsius&timezone=auto&_=' + new Date().getTime();
        runXhr(url, 'météo', function (data) {
          updateWeatherText(data, locationLabel);
        }, 'météo indisponible');
      }


      function parseCoordinateLocation(query) {
        var match = query.match(/^\s*(-?\d+(?:[\.,]\d+)?)\s*[,; ]\s*(-?\d+(?:[\.,]\d+)?)\s*$/);
        var latitude;
        var longitude;
        if (!match) {
          return null;
        }
        latitude = parseFloat(match[1].replace(',', '.'));
        longitude = parseFloat(match[2].replace(',', '.'));
        if (isNaN(latitude) || isNaN(longitude) || latitude < -90 || latitude > 90 || longitude < -180 || longitude > 180) {
          return null;
        }
        return { latitude: latitude, longitude: longitude, label: 'coordonnées' };
      }

      function getFrenchPostalLocation(query) {
        var cleaned = query.replace(/[^0-9abAB]/g, '').toUpperCase();
        var key;
        var dept;
        if (!/^\d{5}$/.test(cleaned) && !/^20[12AB]\d{2}$/.test(cleaned)) {
          return null;
        }
        if (cleaned.indexOf('971') === 0 || cleaned.indexOf('972') === 0 || cleaned.indexOf('973') === 0 || cleaned.indexOf('974') === 0 || cleaned.indexOf('976') === 0) {
          key = cleaned.substr(0, 3);
        } else if (cleaned.indexOf('201') === 0 || cleaned.indexOf('200') === 0 || cleaned.indexOf('20A') === 0) {
          key = '2A';
        } else if (cleaned.indexOf('202') === 0 || cleaned.indexOf('206') === 0 || cleaned.indexOf('20B') === 0) {
          key = '2B';
        } else {
          key = cleaned.substr(0, 2);
        }
        dept = frenchPostalDepartments[key];
        if (!dept) {
          return null;
        }
        return { latitude: dept[1], longitude: dept[2], label: cleaned + ' · ' + dept[0] };
      }

      function useResolvedManualLocation(location) {
        saveManualWeatherLocation(location);
        weatherEl.textContent = 'météo en chargement · ' + location.label;
        loadWeather(location.latitude, location.longitude, location.label);
      }

      function geocodeManualLocation(query) {
        var directLocation = parseCoordinateLocation(query) || getFrenchPostalLocation(query);
        var url;
        if (directLocation) {
          useResolvedManualLocation(directLocation);
          return;
        }

        url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&accept-language=fr&q=' + encodeURIComponent(query);
        weatherEl.textContent = 'géocodage en cours…';
        runXhr(url, 'géocodage', function (result) {
          if (result && result.length) {
            saveManualWeatherLocation({
              latitude: result[0].lat,
              longitude: result[0].lon,
              label: result[0].display_name
            });
            var shortLabel = (result[0].display_name || '').split(',')[0];
            weatherEl.textContent = 'météo en chargement · ' + shortLabel;
            loadWeather(result[0].lat, result[0].lon, shortLabel);
            return;
          }
          weatherEl.textContent = 'adresse introuvable (aucun résultat pour "' + query + '")';
          setWeatherDebug('géocodage OK mais tableau vide · URL=' + shorten(url, 140));
        }, 'adresse introuvable');
      }

      function initWeather() {
        var savedLocation = manualWeatherLocation || getSavedManualWeatherLocation();
        if (savedLocation && savedLocation.latitude && savedLocation.longitude) {
          manualWeatherLocation = savedLocation;
          var shortLabel = savedLocation.label ? savedLocation.label.split(',')[0] : '';
          weatherEl.textContent = 'météo en chargement' + (shortLabel ? ' · ' + shortLabel : '');
          loadWeather(savedLocation.latitude, savedLocation.longitude, shortLabel || null);
          return;
        }

        if (!navigator.geolocation) {
          weatherEl.textContent = 'météo : saisir une adresse';
          return;
        }

        navigator.geolocation.getCurrentPosition(function (position) {
          weatherEl.textContent = 'météo en chargement · GPS';
          loadWeather(position.coords.latitude, position.coords.longitude, 'GPS');
        }, function (err) {
          weatherEl.textContent = 'météo : saisir une adresse' + (err && err.code ? ' (geo err ' + err.code + ')' : '');
        }, { maximumAge: 1800000, timeout: 12000 });
      }

      function toggleSettings() {
        var isHidden = hasClass(settingsPanel, 'hidden');
        setClass(settingsPanel, 'hidden', !isHidden);
        settingsPanel.setAttribute('aria-hidden', !isHidden ? 'true' : 'false');
        settingsButton.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
        setClass(settingsButton, 'active', isHidden);
      }

      function requestFullscreen(element) {
        var request = element.requestFullscreen || element.webkitRequestFullScreen || element.webkitRequestFullscreen || element.mozRequestFullScreen || element.msRequestFullscreen;
        if (request) {
          request.call(element);
        }
      }

      function exitFullscreen() {
        var exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
        if (exit) {
          exit.call(document);
        }
      }

      function isFullscreen() {
        return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
      }

      function toggleFullscreen() {
        if (isFullscreen()) {
          exitFullscreen();
        } else {
          requestFullscreen(document.documentElement);
        }
      }

      settingsButton.onclick = toggleSettings;
      fullscreenButton.onclick = toggleFullscreen;
      if (!document.documentElement.requestFullscreen && !document.documentElement.webkitRequestFullScreen && !document.documentElement.webkitRequestFullscreen && !document.documentElement.mozRequestFullScreen && !document.documentElement.msRequestFullscreen) {
        fullscreenButton.style.display = 'none';
      }
      secondsToggle.onclick = function () {
        showSeconds = secondsToggle.checked;
        updateClock();
      };
      formatToggle.onclick = function () {
        use24Hour = formatToggle.checked;
        updateClock();
      };
      manualLocationForm.onsubmit = function (e) {
        if (e && e.preventDefault) { e.preventDefault(); }
        var query = manualLocationQuery.value.replace(/^\s+|\s+$/g, '');
        if (query) {
          geocodeManualLocation(query);
        }
        return false;
      };

      updateClock();
      initWeather();
      setInterval(updateClock, 1000);
      setInterval(initWeather, 1800000);
    }());
  </script>
</body>
</html>
