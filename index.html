<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>iOS 5 Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    body:before, body:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 1;
    }

    body:before {
      top: 0;
      height: 42%;
      background: -webkit-gradient(linear, left top, left bottom,
        from(rgba(255,255,255,0.135)), color-stop(0.16, rgba(255,255,255,0.045)),
        color-stop(0.42, rgba(255,255,255,0.014)), to(rgba(255,255,255,0)));
      background: linear-gradient(to bottom, rgba(255,255,255,0.135), rgba(255,255,255,0.045) 16%, rgba(255,255,255,0.014) 42%, rgba(255,255,255,0));
    }

    body:after {
      top: 8%;
      left: -8%;
      width: 116%;
      height: 22%;
      -webkit-transform: rotate(-7deg);
      transform: rotate(-7deg);
      background: rgba(255,255,255,0.035);
      -webkit-border-radius: 50%;
      border-radius: 50%;
      -webkit-filter: blur(1px);
      filter: blur(1px);
    }

    #stage {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      margin-top: -184px;
      text-align: center;
      z-index: 2;
    }

    #clock {
      display: inline-block;
      min-width: 940px;
    }

    #time-row {
      white-space: nowrap;
      text-align: center;
    }

    #time {
      display: inline-block;
      font-size: 238px;
      line-height: 214px;
      font-weight: 100;
      letter-spacing: -17px;
      color: #ffffff;
      text-shadow: 0 0 7px rgba(255,255,255,0.72),
        0 0 26px rgba(255,255,255,0.34),
        0 0 72px rgba(122,164,255,0.22);
    }

    #seconds {
      display: inline-block;
      width: 76px;
      margin-left: 18px;
      color: rgba(255,255,255,0.92);
      font-size: 60px;
      line-height: 60px;
      font-weight: 100;
      letter-spacing: -2px;
      text-align: left;
      vertical-align: -42px;
      text-shadow: 0 0 6px rgba(255,255,255,0.5),
        0 0 22px rgba(255,255,255,0.22);
    }

    #date {
      margin-top: 34px;
      color: rgba(210,210,214,0.72);
      font-size: 28px;
      line-height: 34px;
      font-weight: 100;
      letter-spacing: 1.8px;
      text-align: center;
      text-shadow: 0 0 14px rgba(255,255,255,0.12);
    }

    .corner-icon {
      position: absolute;
      bottom: 23px;
      z-index: 3;
      width: 22px;
      height: 22px;
      opacity: 0.42;
      color: #ffffff;
      text-align: center;
      font-size: 22px;
      line-height: 22px;
      text-shadow: 0 0 10px rgba(255,255,255,0.34);
    }

    #settings {
      left: 24px;
    }

    #fullscreen {
      right: 24px;
    }

    #fullscreen:before, #fullscreen:after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: #ffffff;
      opacity: 0.95;
    }

    #fullscreen:before {
      top: 1px;
      right: 1px;
      border-top: 2px solid;
      border-right: 2px solid;
    }

    #fullscreen:after {
      left: 1px;
      bottom: 1px;
      border-left: 2px solid;
      border-bottom: 2px solid;
    }

    @media only screen and (orientation: portrait) {
      #stage { margin-top: -138px; }
      #clock { min-width: 710px; }
      #time { font-size: 176px; line-height: 164px; letter-spacing: -12px; }
      #seconds { width: 58px; margin-left: 13px; font-size: 45px; line-height: 45px; vertical-align: -32px; }
      #date { margin-top: 28px; font-size: 23px; line-height: 30px; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="clock">
      <div id="time-row"><span id="time">08:42</span><span id="seconds">15</span></div>
      <div id="date">Monday, January 9</div>
    </div>
  </div>
  <div id="settings" class="corner-icon">&#9881;</div>
  <div id="fullscreen" class="corner-icon" aria-hidden="true"></div>
  <script type="text/javascript">
    (function () {
      var timeEl = document.getElementById('time');
      var secondsEl = document.getElementById('seconds');
      var dateEl = document.getElementById('date');
      var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

      function pad(value) {
        return value < 10 ? '0' + value : '' + value;
      }

      function updateClock() {
        var now = new Date();
        timeEl.innerHTML = pad(now.getHours()) + ':' + pad(now.getMinutes());
        secondsEl.innerHTML = pad(now.getSeconds());
        dateEl.innerHTML = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
      }

      updateClock();
      setInterval(updateClock, 1000);
    }());
  </script>
</body>
</html>
