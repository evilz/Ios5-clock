<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>iOS 5 Clock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style type="text/css">
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
    }

    body:before, body:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 1;
    }

    body:before {
      top: 0;
      height: 42%;
      background: -webkit-gradient(linear, left top, left bottom,
        from(rgba(255,255,255,0.135)), color-stop(0.16, rgba(255,255,255,0.045)),
        color-stop(0.42, rgba(255,255,255,0.014)), to(rgba(255,255,255,0)));
      background: linear-gradient(to bottom, rgba(255,255,255,0.135), rgba(255,255,255,0.045) 16%, rgba(255,255,255,0.014) 42%, rgba(255,255,255,0));
    }

    body:after {
      top: 8%;
      left: -8%;
      width: 116%;
      height: 22%;
      -webkit-transform: rotate(-7deg);
      transform: rotate(-7deg);
      background: rgba(255,255,255,0.035);
      -webkit-border-radius: 50%;
      border-radius: 50%;
      -webkit-filter: blur(1px);
      filter: blur(1px);
    }

    #stage {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      margin-top: -184px;
      text-align: center;
      z-index: 2;
    }

    #clock {
      display: inline-block;
      min-width: 940px;
    }

    #time-row {
      white-space: nowrap;
      text-align: center;
    }

    #time {
      display: inline-block;
      font-size: 238px;
      line-height: 214px;
      font-weight: 100;
      letter-spacing: -17px;
      color: #ffffff;
      text-shadow: 0 0 7px rgba(255,255,255,0.72),
        0 0 26px rgba(255,255,255,0.34),
        0 0 72px rgba(122,164,255,0.22);
    }

    #seconds {
      display: inline-block;
      width: 76px;
      margin-left: 18px;
      color: rgba(255,255,255,0.92);
      font-size: 60px;
      line-height: 60px;
      font-weight: 100;
      letter-spacing: -2px;
      text-align: left;
      vertical-align: -42px;
      text-shadow: 0 0 6px rgba(255,255,255,0.5),
        0 0 22px rgba(255,255,255,0.22);
    }

    #date {
      margin-top: 34px;
      color: rgba(210,210,214,0.72);
      font-size: 28px;
      line-height: 34px;
      font-weight: 100;
      letter-spacing: 1.8px;
      text-align: center;
      text-shadow: 0 0 14px rgba(255,255,255,0.12);
    }

    .corner-icon {
      position: absolute;
      bottom: 23px;
      z-index: 4;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      opacity: 0.42;
      color: #ffffff;
      text-align: center;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 22px;
      line-height: 32px;
      text-shadow: 0 0 10px rgba(255,255,255,0.34);
      cursor: pointer;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: rgba(255,255,255,0.12);
    }

    .corner-icon:active, .corner-icon.active {
      opacity: 0.88;
    }

    #settings-panel {
      position: absolute;
      left: 18px;
      bottom: 66px;
      z-index: 4;
      width: 188px;
      padding: 12px 13px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(18,18,20,0.86);
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      line-height: 18px;
      text-align: left;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      -webkit-border-radius: 11px;
      border-radius: 11px;
      -webkit-box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      box-shadow: 0 14px 34px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    #settings-panel.hidden {
      display: none;
    }

    #settings-panel label {
      display: block;
      margin: 6px 0;
      white-space: nowrap;
    }

    #settings-panel input {
      margin: 0 8px 0 0;
      vertical-align: -2px;
    }

    #settings {
      left: 24px;
    }

    #fullscreen {
      right: 24px;
    }

    #fullscreen:before, #fullscreen:after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: #ffffff;
      opacity: 0.95;
    }

    #fullscreen:before {
      top: 1px;
      right: 1px;
      border-top: 2px solid;
      border-right: 2px solid;
    }

    #fullscreen:after {
      left: 1px;
      bottom: 1px;
      border-left: 2px solid;
      border-bottom: 2px solid;
    }

    @media only screen and (orientation: portrait) {
      #stage { margin-top: -138px; }
      #clock { min-width: 710px; }
      #time { font-size: 176px; line-height: 164px; letter-spacing: -12px; }
      #seconds { width: 58px; margin-left: 13px; font-size: 45px; line-height: 45px; vertical-align: -32px; }
      #date { margin-top: 28px; font-size: 23px; line-height: 30px; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="clock">
      <div id="time-row"><span id="time">08:42</span><span id="seconds">15</span></div>
      <div id="date">lundi 9 janvier</div>
    </div>
  </div>
  <div id="settings-panel" class="hidden" aria-hidden="true">
    <label><input id="toggle-seconds" type="checkbox" checked>Afficher les secondes</label>
    <label><input id="toggle-24h" type="checkbox" checked>Format 24 heures</label>
  </div>
  <button id="settings" class="corner-icon" type="button" aria-label="Réglages" aria-controls="settings-panel" aria-expanded="false">&#9881;</button>
  <button id="fullscreen" class="corner-icon" type="button" aria-label="Plein écran"></button>
  <script type="text/javascript">
    (function () {
      var timeEl = document.getElementById('time');
      var secondsEl = document.getElementById('seconds');
      var dateEl = document.getElementById('date');
      var settingsButton = document.getElementById('settings');
      var fullscreenButton = document.getElementById('fullscreen');
      var settingsPanel = document.getElementById('settings-panel');
      var secondsToggle = document.getElementById('toggle-seconds');
      var formatToggle = document.getElementById('toggle-24h');
      var days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
      var months = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
      var showSeconds = true;
      var use24Hour = true;

      function pad(value) {
        return value < 10 ? '0' + value : '' + value;
      }

      function updateClock() {
        var now = new Date();
        var hours = now.getHours();

        if (!use24Hour) {
          hours = hours % 12;
          hours = hours ? hours : 12;
        }

        timeEl.innerHTML = pad(hours) + ':' + pad(now.getMinutes());
        secondsEl.innerHTML = pad(now.getSeconds());
        secondsEl.style.visibility = showSeconds ? 'visible' : 'hidden';
        dateEl.innerHTML = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()];
      }

      function toggleSettings() {
        var isHidden = settingsPanel.className.indexOf('hidden') !== -1;
        settingsPanel.className = isHidden ? '' : 'hidden';
        settingsPanel.setAttribute('aria-hidden', isHidden ? 'false' : 'true');
        settingsButton.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
        settingsButton.className = isHidden ? 'corner-icon active' : 'corner-icon';
      }

      function requestFullscreen(element) {
        var request = element.requestFullscreen || element.webkitRequestFullscreen || element.mozRequestFullScreen || element.msRequestFullscreen;
        if (request) {
          request.call(element);
        }
      }

      function exitFullscreen() {
        var exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
        if (exit) {
          exit.call(document);
        }
      }

      function isFullscreen() {
        return document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
      }

      function toggleFullscreen() {
        if (isFullscreen()) {
          exitFullscreen();
        } else {
          requestFullscreen(document.documentElement);
        }
      }

      settingsButton.onclick = toggleSettings;
      fullscreenButton.onclick = toggleFullscreen;
      secondsToggle.onclick = function () {
        showSeconds = secondsToggle.checked;
        updateClock();
      };
      formatToggle.onclick = function () {
        use24Hour = formatToggle.checked;
        updateClock();
      };

      updateClock();
      setInterval(updateClock, 1000);
    }());
  </script>
</body>
</html>
