<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Horloge numérique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style type="text/css">
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #111; color: #f5f2ea;
      font-family: Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    body {
      background: #141414;
      background: -webkit-gradient(radial, 50% 35%, 0, 50% 50%, 650,
        from(#2a2a2a), color-stop(0.45, #151515), to(#050505));
    }
    #wrap {
      position: absolute; top: 50%; left: 0; width: 100%;
      margin-top: -145px; text-align: center;
    }
    #clock {
      display: inline-block;
      padding: 38px 54px 42px 54px;
      min-width: 720px;
      border: 1px solid rgba(255,255,255,0.10);
      -webkit-border-radius: 28px; border-radius: 28px;
      background: rgba(255,255,255,0.035);
      -webkit-box-shadow: 0 28px 80px rgba(0,0,0,0.80),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.55);
      box-shadow: 0 28px 80px rgba(0,0,0,0.80),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.55);
    }
    #time {
      font-size: 138px; line-height: 132px; font-weight: bold;
      letter-spacing: -8px;
      text-shadow: 0 2px 0 rgba(255,255,255,0.06),
        0 12px 38px rgba(0,0,0,0.75);
      white-space: nowrap;
    }
    #seconds {
      font-size: 54px; letter-spacing: -2px; color: #bfb8aa;
      vertical-align: 48px; margin-left: 14px;
    }
    #date {
      margin-top: 18px;
      font-size: 28px; line-height: 36px;
      letter-spacing: 5px; text-transform: uppercase;
      color: #aaa394;
      text-shadow: 0 2px 8px rgba(0,0,0,0.75);
    }
    #hint {
      position: absolute; bottom: 22px; left: 0; width: 100%;
      text-align: center; font-size: 15px; letter-spacing: 2px;
      color: rgba(255,255,255,0.28);
    }
    @media only screen and (orientation: portrait) {
      #wrap { margin-top: -120px; }
      #clock { min-width: 560px; padding: 34px 38px 38px 38px; }
      #time { font-size: 104px; line-height: 104px; letter-spacing: -6px; }
      #seconds { font-size: 42px; vertical-align: 36px; margin-left: 10px; }
      #date { font-size: 23px; letter-spacing: 4px; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="clock">
      <div><span id="time">00:00</span><span id="seconds">00</span></div>
      <div id="date">Chargement</div>
    </div>
  </div>
  <div id="hint">touchez l'écran pour masquer / afficher la date</div>
  <script type="text/javascript">
    (function () {
      var timeEl = document.getElementById('time');
      var secondsEl = document.getElementById('seconds');
      var dateEl = document.getElementById('date');
      var hintEl = document.getElementById('hint');
      var dateVisible = true;
      var days = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
      var months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
      function pad(n) { return n < 10 ? '0' + n : '' + n; }
      function updateClock() {
        var now = new Date();
        timeEl.innerHTML = pad(now.getHours()) + ':' + pad(now.getMinutes());
        secondsEl.innerHTML = pad(now.getSeconds());
        dateEl.innerHTML = days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
      }
      function toggleDate() {
        dateVisible = !dateVisible;
        dateEl.style.display = dateVisible ? 'block' : 'none';
        hintEl.style.display = 'none';
      }
      document.onclick = toggleDate;
      document.ontouchstart = toggleDate;
      updateClock();
      setInterval(updateClock, 1000);
    }());
  </script>
</body>
</html>
